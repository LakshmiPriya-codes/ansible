- name: check number of live is_live_sessions
  hosts: local
  connection: local
  vars: 
   given_number: 7
  tasks:
   - name: is even 
     debug:
      msg: "given number is: {{ given_number }} is even " 
     when: given_number % 2 == 0 

   - name: is even 
     debug:
      msg: "given number is: {{ given_number }} is odd " 
     when: given_number % 2 != 0    