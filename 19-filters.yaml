- name: demo on filters
  hosts: local
  connection: local
  vars:
    topics: Linux , shell , Ansible , Terraform
    tagmap: 
     name: Ansible
     project: roboshop
     environment: dev
    full_name: Lakshmi Priya V 
    ip_address: 1000.890.389.789
    tagslist:  [
        {
            "key": "name",
            "value": "Ansible"
        },
        {
            "key": "project",
            "value": "roboshop"
        },
        {
            "key": "environment",
            "value": "dev"
        }
    ]   
  tasks:
  - name: convert string to linux
    debug:
      msg: "Topics are: {{ topics | split( ',' ) }}" 

  - name: set value
    debug:
      msg: " Hi {{ Greeting | default('Good Morning') }}" 


  - name: convert map to list
    debug:
     msg: "{{ tagmap | dict2items }}"    

  - name: convert list to map
    debug:
      msg: "{{ tagslist | items2dict }}"   

  - name:  convert to uppercase
    debug:
     msg: "{{ full_name | upper }}"   

  - name:  convert to lowercase
    debug:
     msg: "{{ full_name | lower }}"         

  - name: check for ipv4 addresses
    debug:
     msg: "{{ ip_address | ansible.utils.ipv4 }}"          